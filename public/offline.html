<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hors ligne · Bloomy</title>
    <style>
      :root { color-scheme: light; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, sans-serif;
        background: #ffffff;
        color: #17171b;
        text-align: center;
        padding: 24px;
      }
      .card { max-width: 360px; }
      img { width: 120px; height: auto; margin-bottom: 8px; }
      h1 { font-size: 22px; margin: 12px 0 6px; }
      p { color: #76757b; line-height: 1.5; margin: 0 0 20px; }
      button {
        border: 0;
        background: #17171b;
        color: #fff;
        font-weight: 600;
        padding: 12px 22px;
        border-radius: 999px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="/icons/icon-192.png" alt="Bloomy" />
      <h1>Vous êtes hors ligne</h1>
      <p>Vérifiez votre connexion internet, puis réessayez. Vos parfums Bloomy vous attendent.</p>
      <button onclick="location.reload()">Réessayer</button>
    </div>
  </body>
</html>
